name: 🛡️ Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "37 13 * * 3"
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: 🕵️ Scorecard analysis
    runs-on: ubuntu-latest
    if: github.repository == 'remeda/remeda'
    permissions:
      security-events: write # Upload the results to code-scanning dashboard.
      id-token: write # Publish results and get a badge.

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔍 Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: 🛡️ Upload to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
