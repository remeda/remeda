name: 🛡️ Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: "37 13 * * 3"
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: 🕵️ Scorecard analysis
    runs-on: ubuntu-latest
    if: github.repository == 'remeda/remeda'
    permissions:
      security-events: write # Upload the results to code-scanning dashboard.
      id-token: write # Publish results and get a badge.

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔍 Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: 🗃️ Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: SARIF-results
          path: results.sarif
          retention-days: 7

      - name: 🛡️ Upload to code-scanning
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          sarif_file: results.sarif
